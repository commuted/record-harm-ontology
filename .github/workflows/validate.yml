name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Validate ontology, profile, and examples
        # Exits non-zero on any syntax / OWL 2 DL profile / SHACL failure.
        # pyshacl is installed above so the SHACL checks actually run here.
        run: python scripts/validate.py
